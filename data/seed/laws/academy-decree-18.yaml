law_id: academy-decree-18
law_name: 학원의 설립·운영 및 과외교습에 관한 법률 시행령
article: 제18조 별표4
title: 학원 수강료 등의 반환기준
effective_date: "2024-01-01"
text_summary: |
  [별표 4] 교습비등 반환기준 (제18조제3항 관련) — 학원의 설립·운영 및 과외교습에 관한 법률 시행령

  반환사유가 발생한 경우 학원·교습소는 이미 받은 교습비등을 아래 기준에 따라 반환하여야 한다.

  ■ 반환금액 산정
  1) 교습을 시작하기 전: 이미 낸 교습비등의 전액
  2) 교습을 시작한 후
     - 교습기간이 1개월 이내인 경우: 반환사유가 발생한 날까지의 경과한 교습시간에 해당하는 교습비등을 뺀 나머지 금액
     - 교습기간이 1개월을 초과하는 경우:
         ㉮ 반환사유가 발생한 날이 속하는 달의 반환대상 교습비등(위 1개월 이내 기준으로 산정) +
         ㉯ 나머지 달의 교습비등 전액
       을 합산한 금액

  ■ 계산 예시 (수강료 1,050,000원 · 총 3개월(90일) · 35일 수강, 월 교습비 350,000원)
     · 35일 = 1개월(30일) 경과 + 2개월차 5일 경과
     · 2개월차 반환대상 = 350,000 × (30-5)/30 = 291,667원
     · 3개월차 전액 = 350,000원
     · 반환액 = 291,667 + 350,000 = 641,667원
     (교습비가 월 균등하면 결제금액 × 잔여교습일수/전체교습일수 = 1,050,000 × 55/90 = 641,667원으로 동일)

  학원은 수강료 환불을 정당한 사유 없이 거부할 수 없다.
applies_to_personas: ["P2-mother", "P2-father"]
applies_to_life_stages: ["preschool", "elementary", "middle", "high"]
tags: ["academy", "refund", "학원법", "환불기준"]
source_url: "https://www.law.go.kr/lsInfoP.do?lsId=001823"
related_documents: ["academy_refund_request"]
violation_penalty:
  description: "환불 거부 시"
  report_channels:
    - "시도교육청 학원민원 (관할 교육지원청)"
    - "1372 소비자상담센터"
    - "한국소비자원 분쟁조정"
    - "소액사건심판 (140만원 이하)"
calculation:
  formula: "refund = paid * (remaining_days / total_days)"
  notes: "교습 기간 1개월 초과 시 적용"
