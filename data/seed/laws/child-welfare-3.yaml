law_id: child-welfare-3
law_name: 아동복지법
article: 제3조
title: 정의 (아동학대)
effective_date: "2024-01-01"
text_summary: |
  "아동학대"란 보호자를 포함한 성인이 아동의 건강 또는 복지를 해치거나 정상적 발달을 저해할 수 있는 신체적·정신적·성적 폭력이나 가혹행위를 하는 것과 아동의 보호자가 아동을 유기하거나 방임하는 것을 말한다.
  신체적 학대, 정서적 학대, 성적 학대, 방임의 4유형으로 분류된다.
applies_to_personas: ["P1-mother", "P1-father", "P2-mother", "P2-father", "P3"]
applies_to_life_stages: ["infant", "toddler", "preschool", "elementary", "middle", "high"]
tags: ["child-abuse", "아동학대", "정의"]
source_url: "https://www.law.go.kr/lsInfoP.do?lsId=001763"
emergency_contact: "아이지킴이 콜 1577-1391 / 112"
