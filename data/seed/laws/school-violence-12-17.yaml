law_id: school-violence-12-17
law_name: 학교폭력예방 및 대책에 관한 법률
article: 제12조-제17조
title: 학교폭력대책심의위원회의 설치 등
effective_date: "2024-03-01"
text_summary: |
  학교의 장은 학교폭력 사안을 인지하거나 신고를 접수한 경우 즉시 사안조사를 실시하고, 가해 정도에 따라 학교장 자체해결 또는 학교폭력대책심의위원회(학폭위) 심의로 처리한다.

  [절차 요약]
  - 신고 → 사안조사 (학교) → 학교장 자체해결 가능 여부 판단
  - 학교장 자체해결 요건: 2주 이상 신체·정신적 치료 진단서 미발급, 재산상 피해 없음 또는 즉시 복구, 지속·반복적 가해 아님, 보복행위 아님 (피해학생 또는 보호자 동의 시)
  - 자체해결 불가 시 → 교육지원청 학폭위 심의 (개최 14일 이내, 최대 21일)
  - 학폭위 결정 → 가해학생 조치 (제17조 1호-9호: 서면사과 ~ 퇴학)
  - 결정 불복 시 → 행정심판 또는 행정소송

  부모가 화해 권고를 수용해도, 형사고소는 별도 절차로 가능 (정통망법·아동복지법 등).
applies_to_personas: ["P2-father", "P2-mother", "P3"]
applies_to_life_stages: ["elementary", "middle", "high"]
