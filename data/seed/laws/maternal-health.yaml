law_id: maternal-health
law_name: 모자보건법
article: 제10조, 제10조의2
title: 임산부·영유아 등의 정기 건강진단
effective_date: "2024-01-01"
text_summary: |
  국가와 지방자치단체는 임산부·영유아에 대한 정기적인 건강진단을 실시하여야 한다.

  [영유아 건강검진 표준 일정]
  - 1차: 생후 14-35일
  - 2차: 4-6개월
  - 3차: 9-12개월
  - 4차: 18-24개월
  - 5차: 30-36개월
  - 6차: 42-48개월
  - 7차: 54-60개월
  - 8차: 66-71개월

  [임산부 정기 건강진단 기준]
  - 임신 28주까지: 4주 간격
  - 임신 29-36주: 2주 간격
  - 임신 37주 이후: 1주 간격
applies_to_personas: ["P1-mother", "P1-father", "P2-mother", "P2-father", "P3"]
applies_to_life_stages: ["pregnancy", "infant", "toddler", "preschool"]
tags: ["health-checkup", "영유아건강검진", "임산부정기검진"]
source_url: "https://www.law.go.kr/lsInfoP.do?lsId=001750"
calendar_template: "infant-health-checkup"
