law_id: elementary-secondary-education
law_name: 초·중등교육법
article: 제13조
title: 취학의무
effective_date: "2024-01-01"
text_summary: |
  모든 국민은 그 보호하는 자녀 또는 아동이 6세가 된 다음 날 이후 최초 학년 초부터 만 12세가 된 날의 학년 말까지 초등학교에 다니게 하여야 한다.
  보호자는 자녀가 초등학교에 입학할 학년의 전년도 12월까지 거주지 시·군·구청에서 취학통지서를 받아야 한다.
applies_to_personas: ["P1-mother", "P1-father", "P2-mother", "P2-father", "P3"]
applies_to_life_stages: ["preschool", "elementary"]
tags: ["school-entry", "취학", "초등학교"]
source_url: "https://www.law.go.kr/lsInfoP.do?lsId=001717"
calendar_template: "school-entry"
