support_id: maternity-leave-90
name: 출산휴가 90일 (다태아 120일)
amount_krw: 0
amount_description: "90일 (다태아 120일) — 출산 전후. 출산 후 45일(다태아 60일) 이상 보장. 최초 60일은 유급."
condition_summary: "임신 중인 여성근로자 청구 시. 5인 미만 사업장 포함 의무 적용."
