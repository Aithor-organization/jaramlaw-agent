  effective_date: "2024-10-22"
  source_url: "https://www.law.go.kr/lsInfoP.do?lsId=001706"
application_channel: "사업주에 휴가 신청 / 거부 시 1350 고용노동부"
deadline_kind: "before_birth"
notes: "유급 60일 + 무급 30일. 무급 기간은 고용보험에서 출산전후휴가급여 지급."
